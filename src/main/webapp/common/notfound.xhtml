<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <f:facet name="first">
            <meta http-equiv="X-UA-Compatible" content="IE=edge" />
            <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
            <meta name="apple-mobile-web-app-capable" content="yes" />
            <link rel="shortcut icon" href="#{request.contextPath}/jakarta.faces.resource/images/favicon.ico.xhtml?ln=freya-layout" type="image/x-icon"/>
        </f:facet>
        <title>PrimeFaces Freya - Not Found</title>
    </h:head>

    <h:body styleClass="exception-body notfound">
        <div class="exception-topbar">
            <a href="/" class="layout-topbar-logo">
                <p:graphicImage id="logolink" name="images/#{ guestPreferences.lightLogo ? 'logo-freya-white.svg' : 'logo-freya.svg'}"  library="freya-layout" />
            </a>
        </div>
        <div class="exception-wrapper">
            <div class="exception-content">
                <p:graphicImage name="images/pages/asset-404.svg"  library="freya-layout" />
                <span>404</span>
                <span class="exception-subtitle">Looks like you are lost.</span>
                <p:commandButton type="button" value="Go back to home" />
            </div>
            <div class="exception-footer">
                <h4>freya</h4>
                <h6>Copyright Ⓒ PrimeTek Informatics</h6>
            </div>
        </div>
        <h:outputStylesheet name="css/#{guestPreferences.layout}.css" library="freya-layout" />
    </h:body>

</html>
