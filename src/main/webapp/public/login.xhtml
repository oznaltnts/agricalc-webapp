<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/template.xhtml">
             
    <ui:define name="title">Giriş Yap</ui:define>

    <ui:define name="login">
        <f:event type="preRenderView"
                 listener="#{navigationController.redirectToHome()}"/>
    </ui:define>
    
    <ui:define name="content">
        <div class="grid">
            <div class="col">
                <div class="card">
                    <h:form id="loginForm">
                        <p:focus context="loginPanelGrid"/>
                        <h2>Sisteme giriş yapın</h2>
                        <p>Hesabınız mı yok?
                            <a href="/public/register">
                                Kayıt olun
                            </a>
                        </p>
                        <p:panelGrid id="loginPanelGrid"
                                     layout="flex"
                                     columns="1">
                            <p:outputPanel styleClass="ui-float-label">
                                <p:inputMask id="phone"
                                             required="true"
                                             placeholder="Telefon numaranız"
                                             style="width: 200px"
                                             name="phone"
                                             mask="(599) 999 99 99"
                                             validateMask="true"/>
                                <p:outputLabel for="@previous" value="Telefon numaranız" style="margin-left: 0.3rem"/>
                            </p:outputPanel>
                            <p:outputPanel styleClass="ui-float-label">
                                <p:password id="password"
                                            placeholder="Şifreniz"
                                            style="width: 200px"
                                            required="true"
                                            name="password"/>
                                <p:outputLabel for="@previous" value="Şifreniz" style="margin-left: 0.3rem"/>
                            </p:outputPanel>
                            <p:selectBooleanCheckbox name="remember-me"
                                                     itemLabel="Beni hatırla"/>
                        </p:panelGrid>
                        <p:commandButton value="Giriş yapın"
                                         style="width: 200px"
                                         type="button"
                                         onclick="$('#loginForm').submit();"/>
                    </h:form>
                    <br/>
                    <p>Sorunuz mu var? <a href="#">Buraya</a> basın ve bize bildirin.</p>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
