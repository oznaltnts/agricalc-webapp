<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/template.xhtml">

    <ui:define name="title">Hayvansal demirbaş Sayfası</ui:define>

    <ui:define name="content">
        <div class="grid">
            <div class="col">
                <h:form id="animalAssetForm"
                        class="card">
                    <h2>Hayvansal üretim demişbaşlarınız</h2>

                    <p:growl id="growl"
                             showDetail="true"
                             severity="info warn">
                        <p:autoUpdate/>
                    </p:growl>

                </h:form>
            </div>
        </div>
        <div class="grid">
            <div class="col">
                <br/>
                <p>Sorunuz mu var? <a href="#">Buraya</a> basın ve bize bildirin.</p>
            </div>
        </div>
    </ui:define>
</ui:composition>
