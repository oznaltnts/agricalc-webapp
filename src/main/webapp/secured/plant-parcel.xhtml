<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/template.xhtml">
             
    <ui:define name="title">Parsel Sayfası</ui:define>
    
    <ui:define name="content">
        <div class="grid">
            <div class="col">
                <h:form id="parcelListForm"
                        class="card">
                    <h2>Üretim parselleriniz</h2>

                    <p:growl id="growl"
                             showDetail="true"
                             severity="info warn">
                        <p:autoUpdate/>
                    </p:growl>

                    <p:tabView value="#{plantParcelController.parcelTypes}"
                               var="parcelType"
                               dynamic="true"
                               cache="true"
                               focusOnError="true">

                        <p:ajax event="tabChange"
                                update="parcelForm"
                                listener="#{plantParcelController.onTabChange}"/>

                        <p:tab title="#{msg[parcelType]}">
                            <p:dataTable value="#{plantParcelController.detailListByEnum(parcelType)}"
                                         var="parcelView"
                                         stripedRows="true"
                                         emptyMessage="Henüz #{msg[assetType]} eklemediniz">
                                <p:column exportable="false" style="width:200px;text-align:center">
                                    <p:commandButton value="Düzenle"
                                                     update="parcelForm"
                                                     process="@this"
                                                     styleClass="ui-button-warning mr-2"
                                                     action="#{plantParcelController.editRow(parcelView)}"
                                                     icon="pi pi-check"/>
                                    <p:commandButton value="Çıkart"
                                                     update="parcelForm parcelListForm"
                                                     process="@this"
                                                     styleClass="ui-button-danger mr-2"
                                                     action="#{plantParcelController.deleteRow(parcelView)}"
                                                     icon="pi pi-times"/>
                                </p:column>
                                <p:column headerText="Parsel ismi">
                                    <p:outputLabel value="#{parcelView.parcelName}"/>
                                </p:column>
                                <p:column headerText="Ada numarası">
                                    <p:outputLabel value="#{parcelView.adaNumber}"/>
                                </p:column>
                                <p:column headerText="Pafta numarası">
                                    <p:outputLabel value="#{parcelView.paftaNumber}"/>
                                </p:column>
                                <p:column headerText="Alan (Dekar)">
                                    <p:outputLabel value="#{parcelView.areaDecare}"/>
                                </p:column>
                                <p:column headerText="Kiralık">
                                    <p:outputLabel value="#{msg[parcelView.rent]}"/>
                                </p:column>
                            </p:dataTable>

                            <p:commandButton value="#{msg[parcelType]} ekle"
                                             process="@this"
                                             styleClass="mt-2"
                                             update="parcelForm"
                                             action="#{plantParcelController.addNew}"/>
                        </p:tab>
                    </p:tabView>
                </h:form>
            </div>
        </div>
        <div class="grid">
            <div class="col">
                <h:form id="parcelForm"
                        style="visibility: #{plantParcelController.selectedParcelView ne null ? 'visible' : 'hidden'}"
                        class="card">
                    <h2>#{msg[plantParcelController.selectedParcelType]} bilgisini güncelleyin</h2>

                    <p:tabView id="parcelTabView"
                               rendered="#{plantParcelController.selectedParcelView ne null}"
                               dynamic="true"
                               cache="true"
                               focusOnError="true"
                               value="#{plantParcelController.parcelDetails}"
                               var="parcelDetail">
                        <p:ajax event="tabChange"
                                process="@parent"
                                partialSubmit="true"/>
                        <p:tab title="#{msg[parcelDetail]}">
                            <p:panelGrid layout="flex"
                                         rendered="#{parcelDetail eq 'LOCATION_INFO'}"
                                         columnClasses="col-3, col-9"
                                         columns="2">
                                <p:outputLabel for="nameInput"
                                               value="Parsel ismi"/>
                                <p:outputPanel>
                                    <p:inputText id="nameInput"
                                                 value="#{plantParcelController.selectedParcelView.parcelName}"
                                                 style="width: 200px"
                                                 required="true"
                                                 requiredMessage="Bu parsele bir isim verin"
                                                 placeholder="Parsel ismi"/>
                                    <p:message for="@previous"/>
                                </p:outputPanel>
                                <p:outputLabel for="@next"
                                               value="Ada numarası"/>
                                <p:inputNumber placeholder="Ada numarası"
                                               min="0"
                                               inputStyle="width: 200px"
                                               decimalPlaces="0"
                                               value="#{plantParcelController.selectedParcelView.adaNumber}"/>
                                <p:outputLabel for="@next"
                                               value="Pafta numarası"/>
                                <p:inputNumber placeholder="Pafta numarası"
                                               min="0"
                                               inputStyle="width: 200px"
                                               decimalPlaces="0"
                                               value="#{plantParcelController.selectedParcelView.paftaNumber}"/>
                                <p:outputLabel for="@next"
                                               value="Alan (Dekar)"/>
                                <p:inputNumber placeholder="Alan (Dekar)"
                                               value="#{plantParcelController.selectedParcelView.areaDecare}"
                                               min="0"
                                               inputStyle="width: 200px"/>
                                <p:outputLabel for="@next"
                                               value="Bu parsel kiralık mı?"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.rent}">
                                    <p:ajax update="priceLabel priceNumber" partialSubmit="true"/>
                                    <f:selectItem itemLabel="Sahipli" itemValue="#{false}"/>
                                    <f:selectItem itemLabel="Kiralık" itemValue="#{true}"/>
                                </p:selectOneButton>
                                <p:outputPanel id="priceLabel">
                                    <p:outputLabel for="parcelPrice"
                                                   rendered="#{plantParcelController.selectedParcelView.rent ne null and !plantParcelController.selectedParcelView.rent}"
                                                   value="₺ Değeri (tahmini)"/>
                                    <p:outputLabel for="rentPrice"
                                                   value="₺ Kiralık fiyatı"
                                                   rendered="#{plantParcelController.selectedParcelView.rent ne null and plantParcelController.selectedParcelView.rent}"/>
                                </p:outputPanel>
                                <p:outputPanel id="priceNumber">
                                    <p:inputNumber id="parcelPrice"
                                                   placeholder="₺ Değeri (tahmini)"
                                                   symbol="₺ "
                                                   min="0"
                                                   rendered="#{plantParcelController.selectedParcelView.rent ne null and !plantParcelController.selectedParcelView.rent}"
                                                   inputStyle="width: 200px"
                                                   decimalPlaces="0"
                                                   value="#{plantParcelController.selectedParcelView.parcelPrice}"/>
                                    <p:inputNumber id="rentPrice"
                                                   placeholder="₺ Kiralık fiyatı"
                                                   symbol="₺ "
                                                   min="0"
                                                   rendered="#{plantParcelController.selectedParcelView.rent ne null and plantParcelController.selectedParcelView.rent}"
                                                   inputStyle="width: 200px"
                                                   decimalPlaces="0"
                                                   value="#{plantParcelController.selectedParcelView.rentPrice}"/>
                                </p:outputPanel>
                            </p:panelGrid>
                            <p:panelGrid layout="flex"
                                         rendered="#{parcelDetail eq 'LAND_STRUCTURE'}"
                                         columnClasses="col-3, col-9"
                                         columns="2">
                                <p:outputLabel for="@next"
                                               value="Bu parsel kiralık mı?"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedStatusType}">
                                    <f:selectItem itemLabel="Kuru" itemValue="Kuru"/>
                                    <f:selectItem itemLabel="Dikili" itemValue="Dikili"/>
                                    <f:selectItem itemLabel="Sulu" itemValue="Sulu"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Nadas var mı?"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedNadasStatus}">
                                    <f:selectItem itemLabel="Evet" itemValue="#{true}"/>
                                    <f:selectItem itemLabel="Hayır" itemValue="#{false}"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Parsel eğimi"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedSlope}">
                                    <f:selectItem itemLabel="Düz" itemValue="Düz"/>
                                    <f:selectItem itemLabel="Az eğimli" itemValue="Az eğimli"/>
                                    <f:selectItem itemLabel="Eğimli" itemValue="Eğimli"/>
                                    <f:selectItem itemLabel="Bazı yerler düz" itemValue="Bazı yerler düz"/>
                                    <f:selectItem itemLabel="Dik" itemValue="Dik"/>
                                    <f:selectItem itemLabel="Çok dik" itemValue="Çok dik"/>
                                    <f:selectItem itemLabel="Setlenmiş dik" itemValue="Setlenmiş dik"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Parsel yönü"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedOrientation}">
                                    <f:selectItem itemLabel="Güney" itemValue="Güney"/>
                                    <f:selectItem itemLabel="Güneybatı" itemValue="Güneybatı"/>
                                    <f:selectItem itemLabel="Batı" itemValue="Batı"/>
                                    <f:selectItem itemLabel="Kuzeybatı" itemValue="Kuzeybatı"/>
                                    <f:selectItem itemLabel="Kuzey" itemValue="Kuzey"/>
                                    <f:selectItem itemLabel="Kuzeydoğu" itemValue="Kuzeydoğu"/>
                                    <f:selectItem itemLabel="Doğu" itemValue="Doğu"/>
                                    <f:selectItem itemLabel="Güneydoğu" itemValue="Güneydoğu"/>
                                </p:selectOneButton>
                            </p:panelGrid>
                            <p:panelGrid layout="flex"
                                         rendered="#{parcelDetail eq 'SOIL_CHARACTERISTICS'}"
                                         columnClasses="col-3, col-9"
                                         columns="2">
                                <p:outputLabel for="@next"
                                               value="Toprak bünyesi"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedSoilTexture}">
                                    <f:selectItem itemLabel="Tınlı" itemValue="Tınlı"/>
                                    <f:selectItem itemLabel="Kumlu" itemValue="Kumlu"/>
                                    <f:selectItem itemLabel="Killi" itemValue="Killi"/>
                                    <f:selectItem itemLabel="Kumlu - tınlı" itemValue="Kumlu - tınlı"/>
                                    <f:selectItem itemLabel="Milli tın" itemValue="Milli tın"/>
                                    <f:selectItem itemLabel="Bilmiyorum" itemValue="Bilmiyorum"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Aktif toprak derinliği"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedSoilDepth}">
                                    <f:selectItem itemLabel="Sığ (0-30 cm)" itemValue="Sığ"/>
                                    <f:selectItem itemLabel="Orta sığ (31-60 cm)" itemValue="Orta sığ"/>
                                    <f:selectItem itemLabel="Orta (61-90 cm)" itemValue="Orta"/>
                                    <f:selectItem itemLabel="Derin (91+ cm)" itemValue="Derin"/>
                                    <f:selectItem itemLabel="Bilmiyorum" itemValue="Bilmiyorum"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Topraktaki organik madde oranı"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedOrganicMatter}">
                                    <f:selectItem itemLabel="Çok az (% 0-1)" itemValue="Çok az"/>
                                    <f:selectItem itemLabel="Az (% 1-1,5)" itemValue="Az"/>
                                    <f:selectItem itemLabel="Orta (% 1,5-2)" itemValue="Orta"/>
                                    <f:selectItem itemLabel="Yeterli (% 2-3)" itemValue="Yeterli"/>
                                    <f:selectItem itemLabel="Çok iyi (% 3+)" itemValue="Çok iyi"/>
                                    <f:selectItem itemLabel="Bilmiyorum" itemValue="Bilmiyorum"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Toprak tuzluluk"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedSoilSalinity}">
                                    <f:selectItem itemLabel="Tuzsus" itemValue="Tuzsus"/>
                                    <f:selectItem itemLabel="Çok az" itemValue="Çok az"/>
                                    <f:selectItem itemLabel="Az tuzlu" itemValue="Az tuzlu"/>
                                    <f:selectItem itemLabel="Tuzlu" itemValue="Tuzlu"/>
                                    <f:selectItem itemLabel="Çok tuzlu" itemValue="Çok tuzlu"/>
                                    <f:selectItem itemLabel="Bilmiyorum" itemValue="Bilmiyorum"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Kireçlilik"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedLime}">
                                    <f:selectItem itemLabel="Kireçsiz" itemValue="Kireçsiz"/>
                                    <f:selectItem itemLabel="Az kireçli" itemValue="Az kireçli"/>
                                    <f:selectItem itemLabel="Orta kireçli" itemValue="Orta kireçli"/>
                                    <f:selectItem itemLabel="Kireçli" itemValue="Kireçli"/>
                                    <f:selectItem itemLabel="Çok kireçli" itemValue="Çok kireçli"/>
                                    <f:selectItem itemLabel="Bilmiyorum" itemValue="Bilmiyorum"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Fosfor"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedPhosphorus}">
                                    <f:selectItem itemLabel="Çok az" itemValue="Çok az"/>
                                    <f:selectItem itemLabel="Az" itemValue="Az"/>
                                    <f:selectItem itemLabel="Orta" itemValue="Orta"/>
                                    <f:selectItem itemLabel="Yüksek" itemValue="Yüksek"/>
                                    <f:selectItem itemLabel="Çok yüksek" itemValue="Çok yüksek"/>
                                    <f:selectItem itemLabel="Bilmiyorum" itemValue="Bilmiyorum"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Potasyum"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedPotassium}">
                                    <f:selectItem itemLabel="Çok az" itemValue="Çok az"/>
                                    <f:selectItem itemLabel="Az" itemValue="Az"/>
                                    <f:selectItem itemLabel="Orta" itemValue="Orta"/>
                                    <f:selectItem itemLabel="Yüksek" itemValue="Yüksek"/>
                                    <f:selectItem itemLabel="Çok yüksek" itemValue="Çok yüksek"/>
                                    <f:selectItem itemLabel="Bilmiyorum" itemValue="Bilmiyorum"/>
                                </p:selectOneButton>
                            </p:panelGrid>
                            <p:panelGrid layout="flex"
                                         rendered="#{parcelDetail eq 'IRRIGATION_INFORMATION'}"
                                         columnClasses="col-3, col-9"
                                         columns="2">
                                <p:outputLabel for="@next"
                                               value="Su kaynağı nedir?"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedWateringSource}">
                                    <f:selectItem itemLabel="Baraj" itemValue="Baraj"/>
                                    <f:selectItem itemLabel="Sulama koop" itemValue="Koop"/>
                                    <f:selectItem itemLabel="Kuyu" itemValue="kuyu"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Sulama şekli nedir?"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.selectedWateringType}">
                                    <f:selectItem itemLabel="Salma" itemValue="Salma"/>
                                    <f:selectItem itemLabel="Tava" itemValue="Tava"/>
                                    <f:selectItem itemLabel="Karık" itemValue="Karık"/>
                                    <f:selectItem itemLabel="Damla" itemValue="Damla"/>
                                    <f:selectItem itemLabel="Yağmurlama" itemValue="Yağmurlama"/>
                                    <f:selectItem itemLabel="Mini sprey spring" itemValue="Mini sprey spring"/>
                                    <f:selectItem itemLabel="Pivot" itemValue="Pivot"/>
                                    <f:selectItem itemLabel="Center pivot" itemValue="Center pivot"/>
                                    <f:selectItem itemLabel="Diğer" itemValue="Diğer"/>
                                </p:selectOneButton>
                                <p:outputLabel for="@next"
                                               value="Enerji türü"/>
                                <p:selectOneButton value="#{plantParcelController.selectedParcelView.electricSource}">
                                    <f:selectItem itemLabel="Mazot" itemValue="Mazot"/>
                                    <f:selectItem itemLabel="Elektrik" itemValue="Elektrik"/>
                                    <f:selectItem itemLabel="Cazibe" itemValue="Cazibe"/>
                                    <f:selectItem itemLabel="Diğer" itemValue="Diğer"/>
                                </p:selectOneButton>
                            </p:panelGrid>

                            <p:commandButton value="Vazgeç"
                                             update="parcelForm"
                                             process="@this"
                                             resetValues="true"
                                             styleClass="ui-button-warning mr-2"
                                             validateClient="true"
                                             action="#{plantParcelController.cancelSaveButton}"
                                             icon="pi pi-times"/>
                            <p:commandButton value="Kaydet"
                                             update="parcelListForm parcelForm"
                                             process="parcelTabView"
                                             styleClass="ui-button-success mr-2"
                                             validateClient="true"
                                             action="#{plantParcelController.saveButton}"
                                             icon="pi pi-check"/>
                            <p:commandButton value="Kaydet ve ilerle"
                                             update="parcelTabView"
                                             process="@parent"
                                             styleClass="ui-button-success mr-2"
                                             validateClient="true"
                                             action="#{plantParcelController.saveAndNextButton}"
                                             icon="pi pi-chevron-right"/>
                        </p:tab>
                        <f:facet name="footer">
                            Not: <span style="font-weight:bold;">Elde edeceğiniz sonuçlar yaptığınız beyanınıza göre değişecektir.</span>
                        </f:facet>
                    </p:tabView>
                </h:form>
                <br/>
                <p>Sorunuz mu var? <a href="#">Buraya</a> basın ve bize bildirin.</p>
            </div>
        </div>
    </ui:define>

</ui:composition>
