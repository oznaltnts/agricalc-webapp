<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:sec="https://joinfaces.org/security"
                xmlns:fr="http://primefaces.org/freya">

<div class="menu-wrapper">
    <div class="sidebar-logo">
        <a href="dashboard.xhtml">
            <p:graphicImage name="images/logo-freya-single.svg" library="freya-layout" />
        </a>
        <a href="#" class="sidebar-pin" title="Toggle Menu">
            <span class="pin"></span>
        </a>
    </div>
    <div class="layout-menu-container">
        <h:form id="menuform">
            <fr:menu widgetVar="FreyaMenuWidget">
                <p:menuitem value="Ana sayfa" icon="pi pi-home" url="/" />
                <sec:authorize access="!isAuthenticated()">
                    <p:menuitem value="Giriş yap" icon="pi pi-user" url="/public/login"/>
                    <p:menuitem value="Üye ol" icon="pi pi-user-plus" url="/public/register"/>
                </sec:authorize>
                <sec:authorize access="isAuthenticated()">
                    <p:menuitem value="Profil" icon="pi pi-user-edit" url="/secured/profile" />
                    <p:submenu label="Demirbaşlar" icon="pi pi-list">
                        <p:menuitem value="Bitkisel demirbaş" icon="pi pi-hammer" url="/secured/plant-asset"/>
                        <p:menuitem value="Hayvansal demirbaş" icon="pi pi-cog" url="/secured/animal-asset"/>
                    </p:submenu>
                    <p:menuitem value="Parsel" icon="pi pi-sun" url="/secured/parcel" />
                    <p:menuitem value="Bitkisel Üretim" icon="pi pi-sun" url="/secured/plant-product" />
                </sec:authorize>
            </fr:menu>
        </h:form>
    </div>
</div>

</ui:composition>
