<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:sec="https://joinfaces.org/security"
                xmlns:fr="http://primefaces.org/freya">

<div class="menu-wrapper">
    <div class="sidebar-logo">
        <a href="dashboard.xhtml">
            <p:graphicImage name="images/logo-freya-single.svg" library="freya-layout" />
        </a>
        <a href="#" class="sidebar-pin" title="Toggle Menu">
            <span class="pin"></span>
        </a>
    </div>
    <div class="layout-menu-container">
        <h:form id="menuform">
            <fr:menu widgetVar="FreyaMenuWidget">
                <p:menuitem value="Ana sayfa" icon="pi pi-home" url="/" />
                <p:menuitem value="Nasıl çalışır?" icon="pi pi-question" url="/public/how-it-works"/>
                <p:menuitem value="Hakkımızda" icon="pi pi-user" url="#"/>
                <sec:authorize access="hasAuthority('ADMIN')">
                    <p:menuitem value="Yönetici" icon="pi pi-key" url="/secured/admin/user-management" />
                </sec:authorize>
                <sec:authorize access="hasAuthority('USER')">
                    <p:menuitem value="Üretici bilgileri" icon="pi pi-user-edit" url="/secured/profile" />
                    <p:submenu label="Bitkisel" icon="pi pi-list">
                        <p:menuitem value="Demirbaş" icon="pi pi-hammer" url="/secured/plant-asset"/>
                        <p:menuitem value="Parsel" icon="pi pi-sun" url="/secured/plant-parcel" />
                        <p:menuitem value="Üretim" icon="pi pi-sun" url="/secured/plant-product" />
                    </p:submenu>
                    <p:submenu label="Hayvansal" icon="pi pi-list" rendered="false">
                        <p:menuitem value="Hayvansal demirbaş" icon="pi pi-cog" url="/secured/animal-asset"/>
                    </p:submenu>
                </sec:authorize>
            </fr:menu>
        </h:form>
    </div>
</div>

</ui:composition>
