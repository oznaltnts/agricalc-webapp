<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:sec="https://joinfaces.org/security"
                xmlns:fr="http://primefaces.org/freya">

<div class="menu-wrapper">
    <div class="sidebar-logo">
        <a href="dashboard.xhtml">
            <p:graphicImage name="images/logo-freya-single.svg" library="freya-layout" />
        </a>
        <a href="#" class="sidebar-pin" title="Toggle Menu">
            <span class="pin"></span>
        </a>
    </div>
    <div class="layout-menu-container">
        <h:form id="menuform">
            <fr:menu widgetVar="FreyaMenuWidget">
                <p:menuitem value="Ana sayfa" icon="fa-solid fa-home" url="/"/>
                <p:menuitem value="Nasıl çalışır?" icon="fa-solid fa-question" url="/public/how-it-works"/>
                <p:menuitem value="Hakkımızda" icon="fa-solid fa-circle-info" url="#"/>
                <sec:authorize access="hasAuthority('ADMIN')">
                    <p:menuitem value="Kullanıcılar" icon="fa-solid fa-user-gear" url="/secured/admin/user-management"/>
                </sec:authorize>
                <sec:authorize access="hasAuthority('USER')">
                    <p:menuitem value="Üretici bilgileri" icon="fa-solid fa-user-pen" url="/secured/profile"/>
                    <p:submenu label="Bitkisel" icon="fa-solid fa-wheat-awn">
                        <p:menuitem value="Demirbaş" icon="fa-solid fa-tractor" url="/secured/plant-asset"/>
                        <p:menuitem value="Parsel" icon="fa-solid fa-earth-africa" url="/secured/plant-parcel"/>
                        <p:menuitem value="Üretim" icon="fa-solid fa-money-bill-wheat" url="/secured/plant-product"/>
                    </p:submenu>
                    <p:submenu label="Hayvansal" icon="fa-solid fa-cow">
                        <p:menuitem value="Büyükbaş besi" icon="fa-solid fa-shop" url="/secured/animal/dairy-cow"/>
                    </p:submenu>
                </sec:authorize>
            </fr:menu>
        </h:form>
    </div>
</div>

</ui:composition>
