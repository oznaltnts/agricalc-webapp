<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:sec="https://joinfaces.org/security"
                xmlns:po="http://primefaces.org/freya">

    <div class="layout-topbar">
        <div class="layout-topbar-wrapper">
            <div class="layout-topbar-left">
                <a href="#" class="menu-button">
                   <i class="pi pi-bars"/>
                </a>
                <a href="/" class="layout-topbar-logo">
                    <p:graphicImage id="logolink" name="images/#{ guestPreferences.lightLogo ? 'logo-freya-white.svg' : 'logo-freya.svg'}"  library="freya-layout" />
                </a>
            </div>
           
            <ui:include src="./menu.xhtml" />

            <div class="layout-topbar-right">
                <ul class="layout-topbar-actions">
                    <sec:authorize access="!isAuthenticated()">
                        <li class="user-profile">
                            <a href="#{request.contextPath}/login">
                                <span style="white-space: nowrap;font-weight: 600;">Giriş yap</span>
                            </a>
                            <a href="#{request.contextPath}/register">
                                <span style="white-space: nowrap;font-weight: 600;">Üye ol</span>
                            </a>
                        </li>
                    </sec:authorize>
                    <sec:authorize access="isAuthenticated()">
                        <li class="user-profile">
                            <a href="#{request.contextPath}/logout">
                                <span style="white-space: nowrap;font-weight: 600;">Çıkış yap</span>
                            </a>
                        </li>
                    </sec:authorize>

                </ul>
            </div>
        </div>
       
    </div>

</ui:composition>
