<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:po="http://primefaces.org/freya">

    <div class="layout-topbar">
        <div class="layout-topbar-wrapper">
            <div class="layout-topbar-left">
                <a href="#" class="menu-button">
                   <i class="pi pi-bars"/>
                </a>
                <a href="/" class="layout-topbar-logo">
                    <p:graphicImage id="logolink" name="images/#{ guestPreferences.lightLogo ? 'logo-freya-white.svg' : 'logo-freya.svg'}"  library="freya-layout" />
                </a>
            </div>
           
            <ui:include src="./menu.xhtml" />

            <div class="layout-topbar-right">
                <ul class="layout-topbar-actions">
                    <li class="topbar-item search-item ">
                        <a href="#">
                            <i class="topbar-icon pi pi-search"/>
                        </a>
                        <h:form>
                            <h:panelGroup styleClass="search-input-wrapper">
                                <p:inputText placeholder="Search..." />
                                <i class="pi pi-search"/>
                            </h:panelGroup>
                        </h:form>
                        <ul>
                            <h:form onsubmit="return false;">
                                <h:panelGroup styleClass="search-input-wrapper">
                                    <p:inputText placeholder="Search..." />
                                    <i class="pi pi-search"/>
                                </h:panelGroup>
                            </h:form>
                        </ul>
                    </li>
                    <li class="topbar-item user-profile">
                        <a href="#">
                            <p:graphicImage name="images/avatar-profilemenu.png" library="freya-layout" />
                        </a>
                        <ul>
                            <li>
                                <a href="#">
                                    <span>Profile</span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span>Settings</span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span>Messages</span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span>Notifications</span>
                                </a>
                            </li>
                        </ul>
                    </li>
                 
                </ul>
                <a href="#" class="layout-rightpanel-button">
                    <i class="pi pi-arrow-left"/>
                </a>
            </div>
        </div>
       
    </div>

</ui:composition>
